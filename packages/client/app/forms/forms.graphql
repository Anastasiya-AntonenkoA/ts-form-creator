query GetAllForms {
  forms {
    id
    title
    description
  }
}

query GetForm($id: ID!) {
  form(id: $id) {
    id
    title
    description
    questions {
      id
      title
      type
      options
    }
  }
}

query GetFormResponses($id: ID!) {
  form(id: $id) {
    id
    title
    questions {
      id
      title
    }
    responses {
      id
      submittedAt
      answers {
        questionId
        value
      }
    }
  }
}
